<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="LiveScore">
  <defs>
    <!-- Dark scoreboard panel, matching the app board background -->
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1016"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <!-- Inner LED screen: dim red-on-black like a 7-segment display -->
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a0a08"/>
      <stop offset="1" stop-color="#120303"/>
    </linearGradient>
    <!-- Soft green ambient glow from the top, echoing the app shell -->
    <radialGradient id="ambient" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#009b3a" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#009b3a" stop-opacity="0"/>
    </radialGradient>
    <!-- Red LED halo for the digits -->
    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Brazil triple frame: green border, yellow hairline, blue ring -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#panel)" stroke="#00a83e" stroke-width="16"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="url(#ambient)"/>
  <rect x="30" y="30" width="452" height="452" rx="84" fill="none" stroke="#ffdf00" stroke-width="3" opacity="0.85"/>
  <rect x="38" y="38" width="436" height="436" rx="78" fill="none" stroke="#2a52d6" stroke-width="7" opacity="0.8"/>

  <!-- Mini Brazil flag chip (green field, yellow rhombus, blue disc) -->
  <g>
    <rect x="214" y="96" width="84" height="60" rx="12" fill="#00a83e"/>
    <polygon points="256,104 296,126 256,148 216,126" fill="#ffdf00"/>
    <circle cx="256" cy="126" r="15" fill="#2a52d6"/>
  </g>

  <!-- LED screen -->
  <rect x="86" y="188" width="340" height="150" rx="26" fill="url(#screen)" stroke="#ff2a1a" stroke-opacity="0.22" stroke-width="2"/>
  <!-- Score readout: red 7-segment-style digits with a halo -->
  <text x="256" y="306" text-anchor="middle"
        font-family="'Courier New', ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="138" font-weight="700" letter-spacing="6"
        fill="#ff2a1a" filter="url(#redGlow)">1:0</text>

  <!-- Brazil palette baseline -->
  <g>
    <rect x="139" y="392" width="70" height="14" rx="7" fill="#00a83e"/>
    <rect x="221" y="392" width="70" height="14" rx="7" fill="#ffdf00"/>
    <rect x="303" y="392" width="70" height="14" rx="7" fill="#2a52d6"/>
  </g>
</svg>
