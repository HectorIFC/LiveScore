name: Release

on:
  push:
    branches: [main]

# Only one release runs at a time. If a newer commit arrives while a release
# is in progress, the current run finishes — not cancelled — so the tag and
# GitHub Release always complete cleanly. The next queued run then computes the
# version from the commits that arrived in the meantime.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Version, Tag & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for conventional-commits parsing

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Computes the next SemVer from conventional commits since the last tag.
      #
      # Bump rules (squash-merge PR title as conventional commit):
      #   feat!: / BREAKING CHANGE: → major  (0.1.0 → 1.0.0)
      #   feat:                     → minor  (0.0.1 → 0.1.0)
      #   fix: / build: / chore:    → patch  (0.1.0 → 0.1.1)
      - name: Compute next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          tag_prefix: v

      - name: Print version decision
        env:
          PREVIOUS_TAG: ${{ steps.tag.outputs.previous_tag }}
          NEW_VERSION: ${{ steps.tag.outputs.new_version }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          BUMP_TYPE: ${{ steps.tag.outputs.release_type }}
        run: |
          echo "Previous tag : ${PREVIOUS_TAG}"
          echo "New version  : ${NEW_VERSION}"
          echo "New tag      : ${NEW_TAG}"
          echo "Bump type    : ${BUMP_TYPE}"

      - name: Abort if no version change
        if: steps.tag.outputs.new_tag == steps.tag.outputs.previous_tag
        run: |
          echo "No releasable commits since last tag — skipping release."
          exit 0

      # Safety net: skip if the tag already exists (prevents a 409 when two
      # workflow runs compute the same version concurrently before the first
      # one has created the tag).
      - name: Abort if tag already exists
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          if git tag --list | grep -qx "${NEW_TAG}"; then
            echo "Tag ${NEW_TAG} already exists — this version was already released. Skipping."
            exit 0
          fi
          echo "Tag ${NEW_TAG} does not exist yet — proceeding with release."

      # The action is the single source of truth for the version. The embedded
      # <meta name="version"> is updated to match, and the bump commit is pushed
      # to main only AFTER validation passes — so main is never left in a
      # bumped-but-unreleased state. [skip ci] prevents this push from
      # triggering another release run (the loop-prevention mechanism).
      - name: Update embedded version
        env:
          VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          sed -i -E "s#(<meta name=\"version\" content=\")[0-9]+\.[0-9]+\.[0-9]+#\1${VERSION}#" LiveScore.html
          echo "Embedded version set to ${VERSION}:"
          grep -E '<meta name="version"' LiveScore.html

      - name: Stage version bump commit (local only)
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LiveScore.html
          if git diff --cached --quiet; then
            echo "No file changes — nothing to commit."
          else
            git commit -m "chore: release ${NEW_TAG} [skip ci]"
            echo "Version bump committed locally."
          fi

      # "Build & verify" for a single-file app: markup lint, JS syntax, and the
      # self-contained guard — the same gates CI runs on pull requests.
      - name: Validate
        run: |
          npx --yes htmlhint LiveScore.html
          node -e '
            const fs = require("fs");
            const vm = require("vm");
            const html = fs.readFileSync("LiveScore.html", "utf8");
            const m = html.match(/<script>([\s\S]*?)<\/script>/);
            if (!m) { console.error("No <script> block found"); process.exit(1); }
            new vm.Script(m[1]);
            console.log("JS syntax OK");
          '
          if grep -nE '(src|href)=["'"'"']https?://|<script[^>]+src=|<link[^>]+stylesheet' LiveScore.html; then
            echo "::error::External dependency detected — must stay self-contained."
            exit 1
          fi
          echo "Validation passed."

      # Push only after validation succeeds. [skip ci] prevents this push from
      # starting a new release run.
      - name: Push version bump to main
        run: |
          if ! git diff --quiet HEAD origin/main; then
            git push origin main
            echo "Version bump pushed to main."
          else
            echo "Nothing to push."
          fi

      - name: Create git tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag.outputs.new_version }}
          tag_prefix: v

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generateReleaseNotes: false
          makeLatest: true
